{% extends "base.html" %}

{% block title %}Create Purchase Order{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'pharmacy:dashboard' %}">Pharmacy</a></li>
        <li class="breadcrumb-item"><a href="{% url 'pharmacy:purchase_order_list' %}">Purchase Orders</a></li>
        <li class="breadcrumb-item active">New Purchase Order</li>
    </ol>
</nav>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-shopping-cart"></i> Create Purchase Order</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="text-end">
                        <a href="{% url 'pharmacy:purchase_order_list' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Create Order</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
