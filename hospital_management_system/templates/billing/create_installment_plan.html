{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Create Installment Plan{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'billing:billing_list' %}">Billing</a></li>
        <li class="breadcrumb-item"><a href="{% url 'billing:installment_plan_list' %}">Installment Plans</a></li>
        <li class="breadcrumb-item active">New Plan</li>
    </ol>
</nav>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-calendar-check"></i> Create New Installment Plan
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary mt-3">
                        <i class="fas fa-save"></i> Create Plan
                    </button>
                    <a href="{% url 'billing:installment_plan_list' %}" class="btn btn-secondary mt-3">
                        Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
