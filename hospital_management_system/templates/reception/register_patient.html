{% extends "base.html" %}

{% block title %}Register Patient{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 700px;">
    <h2 style="color: var(--primary-color); font-weight: 700; margin-bottom: 20px;">
        <i class="fas fa-user-plus"></i> Register New Patient
    </h2>

    <div class="card">
        <div class="card-body">
            <form method="post" novalidate>
                {% csrf_token %}
                
                <h5 class="mb-3">Personal Information</h5>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">First Name *</label>
                        <input type="text" name="first_name" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Last Name *</label>
                        <input type="text" name="last_name" class="form-control" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email *</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone *</label>
                        <input type="text" name="phone" class="form-control" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Date of Birth *</label>
                        <input type="date" name="date_of_birth" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Gender *</label>
                        <select name="gender" class="form-select" required>
                            <option value="">Select Gender</option>
                            <option value="M">Male</option>
                            <option value="F">Female</option>
                            <option value="O">Other</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Blood Group</label>
                        <select name="blood_group" class="form-select">
                            <option value="">Select Blood Group</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>
                </div>

                <h5 class="mb-3 mt-4">Contact Information</h5>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Emergency Contact Name *</label>
                        <input type="text" name="emergency_contact_name" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Emergency Contact Phone *</label>
                        <input type="text" name="emergency_contact" class="form-control" required>
                    </div>
                </div>

                <h5 class="mb-3 mt-4">Medical Information</h5>

                <div class="mb-3">
                    <label class="form-label">Allergies</label>
                    <textarea name="allergies" class="form-control" rows="2"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Medical History</label>
                    <textarea name="medical_history" class="form-control" rows="3"></textarea>
                </div>

                <h5 class="mb-3 mt-4">Login Credentials</h5>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Password *</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Confirm Password *</label>
                        <input type="password" name="password_confirm" class="form-control" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-success w-100 btn-lg">
                    <i class="fas fa-user-plus"></i> Register Patient
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
